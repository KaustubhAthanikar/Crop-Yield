<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Pune Rice Yield Intelligence</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.css"
    />
    <style>
      /* Custom loader styles while WebAssembly loads */
      #loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #0a0f1e;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-family: 'IBM Plex Mono', monospace, Courier, monospace;
        color: #e2e8f0;
      }
      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.05);
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border-left-color: #4ade80;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
        box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: #4ade80;
        letter-spacing: 0.1em;
        margin-bottom: 8px;
        text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
      }
      .loading-subtitle {
        font-size: 0.9rem;
        color: #94a3b8;
        max-width: 450px;
        text-align: center;
        line-height: 1.6;
        padding: 0 20px;
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-title">🌾 LOADING PUNE YIELD INTEL...</div>
      <div class="loading-subtitle">
        Initializing in-browser Python environment (Pyodide & WebAssembly).<br>
        Downloading packages (pandas, numpy, scikit-learn, xgboost, joblib, plotly)...
      </div>
    </div>
    
    <div id="root"></div>

    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.js";

      const version = new Date().getTime();
      mount(
        {
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: `./app.py?v=${version}`,
            },
            "district_yields.csv": {
              url: `./district_yields.csv?v=${version}`,
            },
            "yield_model.pkl": {
              url: `./yield_model.pkl?v=${version}`,
            },
          },
          requirements: [
            "pandas",
            "numpy",
            "scikit-learn",
            "xgboost",
            "joblib",
            "plotly"
          ],
        },
        document.getElementById("root")
      );

      // Hide the loading overlay when the Streamlit app is mounted
      const checkInterval = setInterval(() => {
        const appNode = document.querySelector(".stApp");
        if (appNode) {
          const loader = document.getElementById("loading-overlay");
          if (loader) {
            loader.style.transition = "opacity 0.5s ease";
            loader.style.opacity = "0";
            setTimeout(() => loader.remove(), 500);
          }
          clearInterval(checkInterval);
        }
      }, 300);
    </script>
  </body>
</html>
